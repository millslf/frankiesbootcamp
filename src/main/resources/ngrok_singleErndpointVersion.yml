version: "3"

agent:
  authtoken: ${NGROK_AUTHTOKEN}

endpoints:
  - name: web
    # Public URL (custom domain)
    url: https://www.frankiesbootcamp.com
    upstream:
      url: http://localhost:8080
    traffic_policy:
      on_http_request:
        - name: ngrok-oauth
          expressions:
            - "req.url.path.startsWith('/_ngrok/') || req.url.path.startsWith('/ngrok/') || req.url.path.matches('^/app(/.*)?$')"
          actions:
            - type: oauth
              config:
                provider: google
                auth_id: bootcamp
                client_id: ${GOOGLE_CLIENT_ID}
                client_secret: ${GOOGLE_CLIENT_SECRET}
                scopes:
                  - https://www.googleapis.com/auth/userinfo.profile
                  - https://www.googleapis.com/auth/userinfo.email
        - name: inject-identity-headers
          expressions:
            - "(req.url.path.matches('^/app(/.*)?$')) && !(
               req.url.path.endsWith('/whoami.jsp') ||
               req.url.path.startsWith('/app/css/')   ||
               req.url.path.startsWith('/app/js/')    ||
               req.url.path.startsWith('/app/img/')   ||
               req.url.path.startsWith('/app/assets/')||
               req.url.path.startsWith('/app/static/')||
               req.url.path.startsWith('/app/fonts/') ||
               req.url.path.endsWith('.css')  || req.url.path.endsWith('.js')   ||
               req.url.path.endsWith('.mjs')  || req.url.path.endsWith('.map')  ||
               req.url.path.endsWith('.png')  || req.url.path.endsWith('.jpg')  ||
               req.url.path.endsWith('.jpeg') || req.url.path.endsWith('.gif')  ||
               req.url.path.endsWith('.svg')  || req.url.path.endsWith('.ico')  ||
               req.url.path.endsWith('.webp') || req.url.path.endsWith('.woff') ||
               req.url.path.endsWith('.woff2')|| req.url.path.endsWith('.ttf')  ||
               req.url.path.endsWith('.eot')
              )"
          actions:
            - type: remove-headers
              config:
                headers: ["ngrok-auth-user-email","ngrok-auth-user-name"]
            - type: add-headers
              config:
                headers:
                  ngrok-auth-user-email: "${actions.ngrok.oauth.identity.email}"
                  ngrok-auth-user-name:  "${actions.ngrok.oauth.identity.name}"
